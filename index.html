      "文京区": { lat: 35.7126, lng: 139.7525 },
      "台東区": { lat: 35.7138, lng: 139.7788 },
      "墨田区": { lat: 35.6964, lng: 139.8050 },
      "江東区": { lat: 35.6733, lng: 139.8176 },
      "品川区": { lat: 35.6285, lng: 139.7388 },
      "目黒区": { lat: 35.6411, lng: 139.6982 },
      "大田区": { lat: 35.5615, lng: 139.7164 },
      "世田谷区": { lat: 35.6467, lng: 139.6537 },
      "渋谷区": { lat: 35.6618, lng: 139.7046 },
      "中野区": { lat: 35.7090, lng: 139.6656 },
      "杉並区": { lat: 35.6921, lng: 139.6360 },
      "豊島区": { lat: 35.7289, lng: 139.7100 },
      "北区": { lat: 35.7520, lng: 139.7388 },
      "荒川区": { lat: 35.7360, lng: 139.7772 },
      "板橋区": { lat: 35.7515, lng: 139.7092 },
      "練馬区": { lat: 35.7390, lng: 139.6523 },
      "足立区": { lat: 35.7750, lng: 139.8020 },
      "葛飾区": { lat: 35.7500, lng: 139.8470 },
      "江戸川区": { lat: 35.7008, lng: 139.8732 }
    };

    const prefectureSelect = document.getElementById("prefectureSelect");
    const citySelect = document.getElementById("citySelect");
    const citySearchInput = document.getElementById("citySearchInput");
    const citySearchResults = document.getElementById("citySearchResults");
    const roomList = document.getElementById("roomList");
    const stationList = document.getElementById("stationList");
    const roomCount = document.getElementById("roomCount");
    const stationTitle = document.getElementById("stationTitle");
    const mapTitle = document.getElementById("mapTitle");
    const searchButton = document.getElementById("searchButton");
    const fitButton = document.getElementById("fitButton");

    let activeBounds = null;

    function fillPrefectures() {
      prefectureSelect.innerHTML = allPrefectures.map(pref => `<option value="${pref}">${pref}</option>`).join("");
    }

    function fillCities() {
      const prefecture = prefectureSelect.value;
      let cities = [];
      if (prefecture === "東京都") {
        cities = Object.keys(tokyoWardMeta);
      } else {
        cities = areaData[prefecture] ? Object.keys(areaData[prefecture]) : [];
      }

      if (cities.length === 0) {
        citySelect.innerHTML = `<option value="">データがありません</option>`;
        citySelect.disabled = true;
      } else {
        citySelect.disabled = false;
        citySelect.innerHTML = cities.map(city => `<option value="${city}">${city}</option>`).join("");
      }
    }

    function featureBadge(label) {
      const iconMap = {
        "給湯器": "water_drop",
        "おむつ替え": "baby_changing_station",
        "個室あり": "chair",
        "電子レンジ": "microwave",
        "ベビーカー可": "stroller",
        "キッズスペース": "toys"
      };

      return `
        <span class="flex items-center gap-1 rounded-full bg-secondary/10 px-3 py-1 text-xs font-bold text-secondary">
          <span class="material-symbols-outlined text-[16px]" style="font-variation-settings:'FILL' 1;">${iconMap[label] || "check_circle"}</span>
          ${label}
        </span>
      `;
    }

    function routeUrl(destination) {
      return `https://www.openstreetmap.org/directions?engine=fossgis_osrm_foot&route=%3B${destination.lat}%2C${destination.lng}`;
    }

    function renderStations(area) {
      stationTitle.textContent = `${citySelect.value}の駅`;
      stationList.innerHTML = area.stations.map(station => `
        <button class="station-button flex items-start gap-3 rounded-lg border border-outline-variant/40 bg-surface-container-low p-3 text-left transition hover:border-secondary/40 hover:bg-secondary/5" data-lat="${station.lat}" data-lng="${station.lng}">
          <span class="material-symbols-outlined mt-0.5 text-secondary">train</span>
          <span>
            <span class="block font-bold text-on-surface">${station.name}</span>
            <span class="block text-xs text-on-surface-variant">${station.lines}</span>
          </span>
        </button>
      `).join("");

      stationList.querySelectorAll(".station-button").forEach(button => {
        button.addEventListener("click", () => {
          document.getElementById("mapFrame")?.scrollIntoView({ behavior: "smooth" });
        });
      });
    }

    function renderRooms(area) {
      roomCount.textContent = `${area.rooms.length}件`;
      roomList.innerHTML = area.rooms.map((room, index) => `
        <article class="room-card cursor-pointer overflow-hidden rounded-xl border border-white bg-white shadow-bloom transition hover:border-primary/20 hover:shadow-panel md:grid md:grid-cols-[1fr_auto]" data-index="${index}">
          <div class="p-5">
            <div class="mb-3 flex items-start justify-between gap-3">
              <div>
                <h4 class="font-display text-lg font-bold leading-tight text-on-surface">${room.name}</h4>
                <p class="mt-1 text-sm text-on-surface-variant">${room.address}</p>
              </div>
              <button class="grid h-10 w-10 shrink-0 place-items-center rounded-full text-primary hover:bg-primary/5" aria-label="${room.name}を保存">
                <span class="material-symbols-outlined">bookmark_border</span>
              </button>
            </div>
            <p class="mb-4 text-sm text-on-surface-variant">${room.note}</p>
            <div class="mb-4 flex flex-wrap gap-2">${room.features.map(featureBadge).join("")}</div>
            <div class="flex flex-wrap items-center gap-x-5 gap-y-2 border-t border-outline-variant/30 pt-3 text-sm">
              <span class="flex items-center gap-1 text-on-surface-variant"><span class="material-symbols-outlined text-[18px] text-primary">schedule</span>${room.hours}</span>
              <span class="flex items-center gap-1 text-on-surface-variant"><span class="material-symbols-outlined text-[18px] text-primary">directions_walk</span>${room.distance}</span>
              <span class="flex items-center gap-1 font-bold text-primary"><span class="material-symbols-outlined text-[18px]" style="font-variation-settings:'FILL' 1;">star</span>${room.rating}</span>
            </div>
          </div>
          <div class="flex items-center gap-2 border-t border-outline-variant/30 bg-surface-container-low p-4 md:w-44 md:flex-col md:justify-center md:border-l md:border-t-0">
            <a class="flex h-10 w-full items-center justify-center gap-1 rounded-full bg-primary px-4 text-sm font-bold text-white transition hover:opacity-90" href="${routeUrl(room)}" target="_blank" rel="noopener">
              <span class="material-symbols-outlined text-[18px]">route</span>
              ルート
            </a>
            <button class="map-focus flex h-10 w-full items-center justify-center gap-1 rounded-full border border-primary/30 px-4 text-sm font-bold text-primary transition hover:bg-primary/5" data-lat="${room.lat}" data-lng="${room.lng}">
              <span class="material-symbols-outlined text-[18px]">map</span>
              地図
            </button>
          </div>
        </article>
      `).join("");

      roomList.querySelectorAll(".room-card").forEach(card => {
        card.addEventListener("mouseenter", () => card.classList.add("scale-[1.01]"));
        card.addEventListener("mouseleave", () => card.classList.remove("scale-[1.01]"));
        card.addEventListener("click", event => {
          if (event.target.closest("a, button")) return;
          document.getElementById("mapFrame")?.scrollIntoView({ behavior: "smooth" });
        });
      });

      roomList.querySelectorAll(".map-focus").forEach(button => {
        button.addEventListener("click", () => {
          document.getElementById("mapFrame")?.scrollIntoView({ behavior: "smooth" });
        });
      });
    }

    function renderMap(area) {
      // Map view is replaced by embedded Google Maps iframe for Tokyo Station.
      // This function is intentionally left empty.
    }

    function renderArea() {
      const prefecture = prefectureSelect.value;
      const city = citySelect.value;
      const area = prefecture && city && areaData[prefecture] ? areaData[prefecture][city] : null;

      mapTitle.textContent = area ? `${prefecture}${city}の授乳室マップ` : `${prefecture}${city || ""}のデータはありません`;
      if (!area) {
        stationTitle.textContent = "データなし";
        stationList.innerHTML = `<p class="text-sm text-on-surface-variant">選択したエリアのデータがありません。</p>`;
        roomCount.textContent = "";
        roomList.innerHTML = `<p class="text-sm text-on-surface-variant">選択したエリアの授乳室データはありません。</p>`;
        return;
      }

      renderStations(area);
      renderRooms(area);
      renderMap(area);
    }

    prefectureSelect.addEventListener("change", () => {
      fillCities();
      renderArea();
    });

    citySelect.addEventListener("change", renderArea);
    searchButton.addEventListener("click", renderArea);
    fitButton.addEventListener("click", () => {
      document.getElementById("mapFrame")?.scrollIntoView({ behavior: "smooth" });
    });

    fillPrefectures();
    fillCities();
    renderArea();
  </script>
</body>
</html>
