      "北海道":{lat:43.0618,lng:141.3545},"東京都":{lat:35.6896,lng:139.6917},
      "埼玉県":{lat:35.8617,lng:139.6455},"千葉県":{lat:35.6074,lng:140.1065},

    };

    function getAllRooms() {
      const rooms = [];
      for (const pref in areaData) {
        for (const city in areaData[pref]) {
          areaData[pref][city].rooms.forEach(room => {
            rooms.push({ ...room, _pref: pref, _city: city });
          });
        }
      }
      return rooms;
    }

    function getDistance(lat1, lng1, lat2, lng2) {
      const R = 6371;
      const dLat = (lat2 - lat1) * Math.PI / 180;
      const dLng = (lng2 - lng1) * Math.PI / 180;
      const a = Math.sin(dLat/2)**2 +
        Math.cos(lat1*Math.PI/180) * Math.cos(lat2*Math.PI/180) * Math.sin(dLng/2)**2;
      return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    }

    function getCityCenter(prefecture, city) {
      if (areaData[prefecture] && areaData[prefecture][city]) {
        const c = areaData[prefecture][city].center;
        return { lat: c[0], lng: c[1] };
      }
      if (cityCoords[prefecture] && cityCoords[prefecture][city]) {
        return cityCoords[prefecture][city];
      }
      return prefCenters[prefecture] || { lat: 35.68, lng: 139.69 };
    }

    function renderRooms(roomsArr) {
      roomCount.textContent = `${roomsArr.length}件`;
      roomList.innerHTML = roomsArr.map((room, index) => `
        <article class="room-card overflow-hidden rounded-xl border border-white bg-white shadow-bloom transition hover:border-primary/20 hover:shadow-panel" data-index="${index}">
          <div class="p-5">
            <div class="mb-3 flex items-start justify-between gap-3">
              <div>
                <div class="mb-1 flex items-center gap-2">
                  <span class="flex h-6 w-6 items-center justify-center rounded-full bg-primary text-xs font-bold text-white">${index + 1}</span>
                  <h4 class="font-display text-lg font-bold leading-tight text-on-surface">${room.name}</h4>
                </div>
                <p class="mt-1 text-sm text-on-surface-variant">${room.address}</p>
                ${room._distKm !== undefined ? `<p class="mt-1 text-xs font-bold text-secondary">📍 検索エリアから約 ${room._distKm.toFixed(1)} km</p>` : ""}
              </div>
              <button class="grid h-10 w-10 shrink-0 place-items-center rounded-full text-primary hover:bg-primary/5" aria-label="${room.name}を保存">
                <span class="material-symbols-outlined">bookmark_border</span>
              </button>
            </div>
            <p class="mb-4 text-sm text-on-surface-variant">${room.note}</p>
            <div class="mb-4 flex flex-wrap gap-2">${room.features.map(featureBadge).join("")}</div>
            <div class="flex flex-wrap items-center gap-x-5 gap-y-2 border-t border-outline-variant/30 pt-3 text-sm">
              <span class="flex items-center gap-1 text-on-surface-variant"><span class="material-symbols-outlined text-[18px] text-primary">schedule</span>${room.hours}</span>
              <span class="flex items-center gap-1 text-on-surface-variant"><span class="material-symbols-outlined text-[18px] text-primary">directions_walk</span>${room.distance}</span>
              <span class="flex items-center gap-1 font-bold text-primary"><span class="material-symbols-outlined text-[18px]" style="font-variation-settings:'FILL' 1;">star</span>${room.rating}</span>
            </div>
          </div>
          <div class="flex items-center gap-3 border-t border-outline-variant/30 bg-surface-container-low p-4">
            <a class="flex h-10 flex-1 items-center justify-center gap-1 rounded-full bg-primary px-4 text-sm font-bold text-white transition hover:opacity-90" href="${routeUrl(room)}" target="_blank" rel="noopener">
              <span class="material-symbols-outlined text-[18px]">route</span>ルートを確認
            </a>
          </div>
        </article>
      `).join("");

      roomList.querySelectorAll(".room-card").forEach(card => {
        card.addEventListener("mouseenter", () => card.classList.add("scale-[1.01]", "transition-transform"));
        card.addEventListener("mouseleave", () => card.classList.remove("scale-[1.01]"));
      });
    }

    function renderArea() {
      const prefecture = prefectureInput.value.trim();
      const city = cityInput.value.trim();
      if (!prefecture || !city) {
        resultHeader.classList.add("hidden");
        roomList.innerHTML = "";
        return;
      }

      const center = getCityCenter(prefecture, city);

      // 全授乳室を距離順で並べ上位3件を取得
      const nearest3 = getAllRooms()
        .map(room => ({ ...room, _distKm: getDistance(center.lat, center.lng, room.lat, room.lng) }))
        .sort((a, b) => a._distKm - b._distKm)
        .slice(0, 3);

      resultHeader.classList.remove("hidden");
      searchArea.textContent = `${prefecture} ${city} 周辺の授乳室`;

      renderRooms(nearest3);

      // 結果エリアへスクロール
      resultHeader.scrollIntoView({ behavior: "smooth", block: "start" });
    }

    prefectureInput.addEventListener("input", updateCityDatalist);
    searchButton.addEventListener("click", renderArea);

    // Enterキーでも検索
    prefectureInput.addEventListener("keydown", e => { if (e.key === "Enter") cityInput.focus(); });
    cityInput.addEventListener("keydown", e => { if (e.key === "Enter") renderArea(); });

    fillPrefectureDatalist();
  </script>
